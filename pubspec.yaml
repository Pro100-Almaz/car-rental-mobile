name: car_rental_mobile
description: "AutoFleet — Car sharing operations platform client app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  intl: any
  dio: ^5.9.2
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  flutter_secure_storage: ^10.2.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/welcome/
